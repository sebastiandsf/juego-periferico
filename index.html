<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clasifica los periféricos</title>
<style>
body { font-family: Arial; text-align: center; background:#f4f4f4; }
.container { display:flex; justify-content: space-around; margin-top:20px; }
.column { width:22%; background:white; padding:10px; border-radius:10px; min-height:200px; }
.card { background:#2196F3; color:white; padding:15px; margin:20px auto; border-radius:5px; cursor:grab; width:200px; }
.mini-card { background:#777; color:white; padding:5px; margin:5px; border-radius:5px; font-size:12px; cursor:default; }
.correct { background:#4CAF50 !important; }
.wrong { background:#f44336 !important; }
#score { font-size:20px; margin-top:10px; }
#timer { font-size:20px; margin-top:5px; }
button { margin:5px; padding:10px; }
</style>
</head>
<body>

<h1>🎮 Clasifica los periféricos</h1>
<p>Arrastrá el elemento a la categoría correcta</p>

<button onclick="startGame(false)">Modo Normal</button>
<button onclick="startGame(true)">Modo Difícil ⏱</button>

<div id="score">Puntaje: 0</div>
<div id="timer"></div>

<div id="currentCard"></div>

<div class="container">
  <div class="column" data-category="entrada">Entrada</div>
  <div class="column" data-category="salida">Salida</div>
  <div class="column" data-category="almacenamiento">Almacenamiento</div>
  <div class="column" data-category="mixto">Mixto</div>
</div>

<script>
const data = [
  {name:"Teclado", type:"entrada"},
  {name:"Mouse", type:"entrada"},
  {name:"Micrófono", type:"entrada"},
  {name:"Webcam", type:"entrada"},
  {name:"Monitor", type:"salida"},
  {name:"Parlantes", type:"salida"},
  {name:"Impresora", type:"salida"},
  {name:"Proyector", type:"salida"},
  {name:"Pendrive", type:"almacenamiento"},
  {name:"Disco duro", type:"almacenamiento"},
  {name:"Tarjeta SD", type:"almacenamiento"},
  {name:"SSD", type:"almacenamiento"},
  {name:"Pantalla táctil", type:"mixto"},
  {name:"Impresora multifunción", type:"mixto"},
  {name:"Auriculares con micrófono", type:"mixto"},
  {name:"Joystick", type:"mixto"}
];

let currentIndex = 0;
let current;
let score = 0;
let timeLeft = 60;
let timerInterval;
let hardMode = false;

const scoreDisplay = document.getElementById('score');
const timerDisplay = document.getElementById('timer');
const cardContainer = document.getElementById('currentCard');

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function showNextCard() {
  cardContainer.innerHTML = '';

  if (currentIndex >= data.length) {
    alert('🎉 Juego terminado. Puntaje final: ' + score);
    return;
  }

  current = data[currentIndex];

  const div = document.createElement('div');
  div.className = 'card';
  div.draggable = true;
  div.textContent = current.name;

  div.addEventListener('dragstart', () => {
    dragged = div;
  });

  cardContainer.appendChild(div);
}

let dragged;

function startGame(isHard) {
  hardMode = isHard;
  score = 0;
  currentIndex = 0;
  timeLeft = 60;
  scoreDisplay.textContent = 'Puntaje: 0';
  timerDisplay.textContent = '';

  // limpiar columnas
  document.querySelectorAll('.column').forEach(c => c.innerHTML = c.dataset.category.charAt(0).toUpperCase() + c.dataset.category.slice(1));

  shuffle(data);
  showNextCard();

  if (timerInterval) clearInterval(timerInterval);

  if (hardMode) {
    timerDisplay.textContent = 'Tiempo: 60';
    timerInterval = setInterval(() => {
      timeLeft--;
      timerDisplay.textContent = 'Tiempo: ' + timeLeft;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        alert('⏰ Tiempo terminado. Puntaje final: ' + score);
      }
    }, 1000);
  }
}

document.querySelectorAll('.column').forEach(col => {
  col.addEventListener('dragover', e => e.preventDefault());

  col.addEventListener('drop', () => {
    if (!dragged) return;

    let mini = document.createElement('div');
    mini.className = 'mini-card';
    mini.textContent = current.name;

    if (current.type === col.dataset.category) {
      mini.classList.add('correct');
      score++;
    } else {
      mini.classList.add('wrong');
      score--;
    }

    col.appendChild(mini);

    scoreDisplay.textContent = 'Puntaje: ' + score;

    setTimeout(() => {
      currentIndex++;
      showNextCard();
    }, 300);

    dragged = null;
  });
});
</script>

</body>
</html>
